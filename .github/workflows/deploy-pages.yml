name: Deploy web to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "packages/**"
      - "package.json"
      - "tsconfig.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.12.0"
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --silent

      - name: Run tests
        run: npm test

      - name: Build web application
        run: npm run build:web

      - name: Verify generated site entry
        run: |
          test -f apps/web/dist/index.html
          grep -q "AI Network Check" apps/web/dist/index.html
          find apps/web/dist -maxdepth 2 -type f -print | sort

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: apps/web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    name: Verify public Pages URL
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for propagation and verify live site
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          set -euo pipefail
          echo "Verifying ${PAGE_URL}"

          for attempt in $(seq 1 18); do
            status="$(curl --silent --show-error --location \
              --output pages-response.html \
              --write-out '%{http_code}' \
              --max-time 20 \
              "${PAGE_URL}" || true)"

            echo "Attempt ${attempt}/18: HTTP ${status}"

            if [ "${status}" = "200" ]; then
              grep -q "AI Network Check" pages-response.html
              echo "GitHub Pages is live and serving the expected application."
              exit 0
            fi

            if [ "${attempt}" -lt 18 ]; then
              sleep 10
            fi
          done

          echo "GitHub Pages did not become available. Final response preview:"
          head -c 1200 pages-response.html || true
          echo
          exit 1

      - name: Upload failed Pages response
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pages-live-response
          path: pages-response.html
          retention-days: 3
